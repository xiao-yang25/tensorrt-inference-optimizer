build:
  onnx_path: model/bevdet.onnx
  engine_path: engine/bevdet_fp16.engine
  fp16: true
  int8: false
  workspace_mb: 4096
  input_tensor_name: input
  calibrator_cache_path: engine/calib.cache
  calibration_batches:
    - sample0/calib_batch_000.bin
    - sample0/calib_batch_001.bin
  profile:
    min: [1, 6, 3, 256, 704]
    opt: [4, 6, 3, 256, 704]
    max: [8, 6, 3, 256, 704]

runtime:
  warmup_runs: 20
  benchmark_runs: 200
  batch: 1
  use_async: true
  stream_count: 2
